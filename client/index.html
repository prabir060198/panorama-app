<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>4 Step Panorama</title>

<style>
body { margin:0; background:black; }

video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
}

#overlay {
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  color:white;
  font-size:20px;
}

#captureBtn {
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:15px 25px;
  font-size:18px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="overlay">Capture FRONT</div>
<button id="captureBtn">CAPTURE</button>

<script src="capture.js"></script>

</body>
</html>
