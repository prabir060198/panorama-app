<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>360 Guided Capture</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:sans-serif; }

video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

.center-ring{
  position:absolute;
  width:80px;
  height:80px;
  border:2px solid white;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.progress-ring{
  position:absolute;
  width:80px;
  height:80px;
  border-radius:50%;
  border:4px solid transparent;
  border-top:4px solid lime;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotate(0deg);
}

.target-dot{
  position:absolute;
  width:20px;
  height:20px;
  border-radius:50%;
  background:red;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

#status{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  color:white;
  font-size:18px;
}

#startBtn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 22px;
  border-radius:10px;
  background:black;
  color:white;
  border:1px solid white;
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>

<div class="center-ring"></div>
<div class="progress-ring" id="progress"></div>
<div class="target-dot" id="target"></div>

<div id="status">Press Start</div>
<button id="startBtn">START</button>

<script src="app.js"></script>

</body>
</html>
