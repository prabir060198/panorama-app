<!DOCTYPE html>
<html>
<head>
  <title>Auto Panorama Capture</title>

  <style>
    body {
      margin:0;
      overflow:hidden;
      background:black;
      font-family:Arial;
    }

    video {
      width:100%;
      height:100vh;
      object-fit:cover;
    }

    #guide {
      position:absolute;
      width:25px;
      height:25px;
      background:red;
      border-radius:50%;
      transform:translate(-50%, -50%);
    }

    #target {
      position:absolute;
      width:25px;
      height:25px;
      background:lime;
      border-radius:50%;
      transform:translate(-50%, -50%);
    }

    #info {
      position:absolute;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      color:white;
      font-size:16px;
      background:rgba(0,0,0,0.6);
      padding:8px 12px;
      border-radius:8px;
    }

    #preview {
      position:absolute;
      bottom:10px;
      width:100%;
      display:flex;
      gap:10px;
      overflow-x:auto;
      padding:10px;
    }

    #preview img {
      height:70px;
      border:2px solid white;
      border-radius:6px;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="guide"></div>   <!-- moving dot -->
<div id="target"></div>  <!-- fixed target -->

<div id="info">Move phone to align dots</div>
<div id="preview"></div>

<script>
const video = document.getElementById("video");
const guide = document.getElementById("guide");
const target = document.getElementById("target");
const info = document.getElementById("info");
const preview = document.getElementById("preview");

let images = [];
let step = 0;
let capturing = false;

// 🎯 TARGET POSITIONS (angles)
const targets = [
  {yaw:0, pitch:0},
  {yaw:30, pitch:0},
  {yaw:60, pitch:0},
  {yaw:90, pitch:0},
  {yaw:45, pitch:-20},
  {yaw:45, pitch:20}
];

// 📷 START CAMERA
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" } }
  });
  video.srcObject = stream;
}
startCamera();

// 🎯 PLACE TARGET DOT CENTER
target.style.left = "50%";
target.style.top = "50%";

// 📐 CONVERT GYRO TO SCREEN
function updateGuide(alpha, beta) {
  const targetData = targets[step];

  let dx = alpha - targetData.yaw;
  let dy = beta - targetData.pitch;

  // normalize angles
  dx = ((dx + 540) % 360) - 180;

  const x = 50 + dx;   // horizontal move
  const y = 50 + dy;   // vertical move

  guide.style.left = x + "%";
  guide.style.top = y + "%";

  // 🎯 AUTO CAPTURE WHEN ALIGNED
  if (Math.abs(dx) < 5 && Math.abs(dy) < 5 && !capturing) {
    capture();
  }
}

// 📸 CAPTURE FUNCTION
function capture() {
  capturing = true;

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  const imgData = canvas.toDataURL("image/jpeg", 0.8);
  images.push(imgData);

  // show preview
  const img = document.createElement("img");
  img.src = imgData;
  preview.appendChild(img);

  step++;

  if (step >= targets.length) {
    info.innerText = "Done ✅";
    window.removeEventListener("deviceorientation", handleOrientation);
    console.log(images);
    return;
  }

  info.innerText = `Captured ${step}/${targets.length}`;

  setTimeout(() => capturing = false, 1000); // prevent duplicate capture
}

// 📡 GYROSCOPE EVENT
function handleOrientation(event) {
  const alpha = event.alpha || 0; // yaw
  const beta = event.beta || 0;   // pitch

  updateGuide(alpha, beta);
}

// ⚠️ iOS permission
function initGyro() {
  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {

    DeviceOrientationEvent.requestPermission()
      .then(response => {
        if (response === "granted") {
          window.addEventListener("deviceorientation", handleOrientation);
        } else {
          alert("Permission denied");
        }
      });

  } else {
    window.addEventListener("deviceorientation", handleOrientation);
  }
}

// 👆 start on tap (required for mobile)
document.body.addEventListener("click", initGyro, { once:true });

</script>

</body>
</html>
