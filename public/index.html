<!DOCTYPE html>
<html>
<head>
  <title>Guided Panorama Capture</title>

  <style>
    body {
      margin:0;
      overflow:hidden;
      background:black;
      font-family:Arial;
    }

    video {
      width:100%;
      height:100vh;
      object-fit:cover;
    }

    #guide {
      position:absolute;
      width:25px;
      height:25px;
      background:red;
      border-radius:50%;
      transform:translate(-50%, -50%);
    }

    #btn {
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      padding:12px 25px;
      font-size:18px;
      border:none;
      border-radius:8px;
      background:#00c853;
      color:white;
    }

    #info {
      position:absolute;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      color:white;
      font-size:18px;
      background:rgba(0,0,0,0.5);
      padding:8px 12px;
      border-radius:8px;
    }

    /* ✅ IMAGE PREVIEW BAR */
    #preview {
      position:absolute;
      bottom:80px;
      left:0;
      width:100%;
      display:flex;
      overflow-x:auto;
      gap:10px;
      padding:10px;
    }

    #preview img {
      height:80px;
      border-radius:8px;
      border:2px solid white;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="guide"></div>
<div id="info">Align dot and capture</div>
<button id="btn">Capture</button>

<!-- ✅ PREVIEW -->
<div id="preview"></div>

<script>
const video = document.getElementById("video");
const guide = document.getElementById("guide");
const info = document.getElementById("info");
const preview = document.getElementById("preview");
const btn = document.getElementById("btn");

// ✅ BACK CAMERA (works in most devices)
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });
    video.srcObject = stream;
  } catch (err) {
    alert("Camera access failed: " + err.message);
  }
}

startCamera();

let images = [];
let step = 0;

// 🎯 GUIDE POSITIONS (panorama flow)
const positions = [
  {x:20, y:50},
  {x:40, y:50},
  {x:60, y:50},
  {x:80, y:50},
  {x:50, y:30},
  {x:50, y:70}
];

// 🔄 MOVE GUIDE
function moveGuide() {
  const pos = positions[step];
  guide.style.left = pos.x + "%";
  guide.style.top = pos.y + "%";
  info.innerText = `Step ${step + 1} / ${positions.length}`;
}

moveGuide();

// 📸 CAPTURE IMAGE
btn.onclick = () => {

  if (!video.videoWidth) {
    alert("Camera not ready yet");
    return;
  }

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const imgData = canvas.toDataURL("image/jpeg", 0.8);

  images.push(imgData);

  // ✅ SHOW PREVIEW IMAGE
  const img = document.createElement("img");
  img.src = imgData;
  preview.appendChild(img);

  step++;

  if (step < positions.length) {
    moveGuide();
  } else {
    info.innerText = "Captured all images ✅";
    btn.disabled = true;

    console.log("All Images:", images);

    // 👉 NEXT STEP: send images to backend
    // fetch('/upload', { method:'POST', body: JSON.stringify(images) })
  }
};
</script>

</body>
</html>
