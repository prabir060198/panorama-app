<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Photo Sphere</title>
<style>
body{margin:0;background:black;color:white;font-family:sans-serif;overflow:hidden}
video{position:absolute;width:100%;height:100%;object-fit:cover}
#ui{
  position:absolute;
  width:100%;height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
#target{
  width:60px;height:60px;
  border:3px solid white;
  border-radius:50%;
}
#dot{
  position:absolute;
  width:12px;height:12px;
  border-radius:50%;
  background:red;
}
button{
  position:absolute;
  bottom:40px;
  padding:15px 30px;
  font-size:16px;
}
canvas{position:absolute;top:0;left:0}
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<div id="ui">
  <div id="target"></div>
  <div id="dot"></div>
  <button onclick="capture()">Capture</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
let video = document.getElementById("video");
let dot = document.getElementById("dot");

let images = [];
let index = 0;

const TOTAL = 24;

let gyroAlpha = 0;
let gyroBeta = 0;

const shots = [];
for(let i=0;i<24;i++){
  shots.push({
    hz: (i%6)*60,
    vt: Math.floor(i/6)*30 - 45
  });
}

// CAMERA
navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
}).then(stream=>{
  video.srcObject = stream;
});

// GYRO
window.addEventListener("deviceorientation", e=>{
  gyroAlpha = e.alpha || 0;
  gyroBeta = e.beta || 0;

  updateTarget();
});

// TARGET MOVEMENT
function updateTarget(){
  if(index>=TOTAL)return;

  let t = shots[index];

  let diffH = ((t.hz - gyroAlpha)+540)%360-180;
  let diffV = t.vt - gyroBeta;

  let x = 50 + diffH;
  let y = 50 + diffV;

  x = Math.max(10, Math.min(90,x));
  y = Math.max(10, Math.min(90,y));

  dot.style.left = x+"%";
  dot.style.top = y+"%";

  if(Math.abs(diffH)<5 && Math.abs(diffV)<5){
    dot.style.background="lime";
  }else{
    dot.style.background="red";
  }
}

// CAPTURE
function capture(){
  if(index>=TOTAL)return;

  let canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video,0,0);

  images.push(canvas.toDataURL("image/jpeg"));

  index++;

  if(index===TOTAL){
    start3D();
  }
}

// =======================
// 3D SPHERE VIEWER
// =======================
function start3D(){

  document.body.innerHTML = "";

  let scene = new THREE.Scene();

  let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 1, 1100);

  let renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  let texture = createEquirectangular();

  let geometry = new THREE.SphereGeometry(500, 60, 40);
  geometry.scale(-1,1,1);

  let material = new THREE.MeshBasicMaterial({map:texture});

  let mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  let lon = 0, lat = 0;

  document.addEventListener("mousemove", e=>{
    lon += e.movementX * 0.1;
    lat -= e.movementY * 0.1;
  });

  function animate(){
    requestAnimationFrame(animate);

    lat = Math.max(-85, Math.min(85, lat));

    let phi = THREE.MathUtils.degToRad(90 - lat);
    let theta = THREE.MathUtils.degToRad(lon);

    camera.target = new THREE.Vector3(
      500 * Math.sin(phi) * Math.cos(theta),
      500 * Math.cos(phi),
      500 * Math.sin(phi) * Math.sin(theta)
    );

    camera.lookAt(camera.target);

    renderer.render(scene, camera);
  }

  animate();
}

// =======================
// SIMPLE STITCH (BASIC)
// =======================
function createEquirectangular(){

  let canvas = document.createElement("canvas");
  canvas.width = 2048;
  canvas.height = 1024;

  let ctx = canvas.getContext("2d");

  let img = new Image();
  img.src = images[0]; // simple preview (not perfect stitch)

  ctx.fillStyle="black";
  ctx.fillRect(0,0,2048,1024);

  images.forEach((src,i)=>{
    let x = (i%6)*(2048/6);
    let y = Math.floor(i/6)*(1024/4);

    let im = new Image();
    im.src = src;
    im.onload=()=>{
      ctx.drawImage(im,x,y,340,250);
    }
  });

  return new THREE.CanvasTexture(canvas);
}
</script>

</body>
</html>
