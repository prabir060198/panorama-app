<!DOCTYPE html>
<html>
<head>
  <title>Street View Style Capture</title>

  <style>
    body { margin:0; overflow:hidden; background:black; font-family:Arial; }

    video {
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    canvas {
      position:absolute;
      top:0;
      left:0;
      z-index:-1;
    }

    /* CENTER FRAME */
    #frame {
      position:absolute;
      width:260px;
      height:260px;
      border:4px solid white;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
    }

    /* ALIGN CIRCLE */
    #circle {
      position:absolute;
      width:80px;
      height:80px;
      border:4px solid white;
      border-radius:50%;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
    }

    /* FLOATING NEXT FRAME */
    #ghost {
      position:absolute;
      width:200px;
      height:200px;
      border:3px solid rgba(255,255,255,0.5);
      top:45%;
      left:70%;
      transform:translate(-50%, -50%) rotateY(20deg);
      opacity:0.6;
    }

    /* BUTTONS */
    #controls {
      position:absolute;
      bottom:30px;
      width:100%;
      display:flex;
      justify-content:center;
      gap:40px;
    }

    .btn {
      width:70px;
      height:70px;
      border-radius:50%;
      border:3px solid white;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:24px;
    }

    #capture {
      background:#90caf9;
      color:black;
    }

    #step {
      position:absolute;
      bottom:120px;
      left:50%;
      transform:translateX(-50%);
      background:#2196f3;
      padding:6px 14px;
      border-radius:20px;
      color:white;
    }

  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="three"></canvas>

<div id="frame"></div>
<div id="circle"></div>
<div id="ghost"></div>

<div id="step">1x</div>

<div id="controls">
  <div class="btn">↺</div>
  <div id="capture" class="btn">●</div>
  <div class="btn">✕</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
const video = document.getElementById("video");

// 📷 CAMERA
navigator.mediaDevices.getUserMedia({
  video:{ facingMode:{ ideal:"environment"} }
})
.then(stream => video.srcObject = stream);

// 🎮 THREE SCENE
const canvas = document.getElementById("three");

const renderer = new THREE.WebGLRenderer({ canvas, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.set(0,1,5);

// 🌐 GRID FLOOR (like your screenshot)
const grid = new THREE.GridHelper(20, 40, 0x888888, 0x444444);
scene.add(grid);

// 🎯 FLOATING FRAME (next capture)
const geo = new THREE.PlaneGeometry(2,2);
const mat = new THREE.MeshBasicMaterial({
  color:0xffffff,
  wireframe:true
});
const frame3D = new THREE.Mesh(geo, mat);

frame3D.position.set(3,1,-3);
scene.add(frame3D);

// 📡 GYRO CONTROL
function handleOrientation(e){
  const alpha = e.alpha * Math.PI/180;
  const beta = e.beta * Math.PI/180;

  camera.rotation.y = alpha;
  camera.rotation.x = beta;
}

// enable gyro
document.body.addEventListener("click", () => {
  if (DeviceOrientationEvent.requestPermission) {
    DeviceOrientationEvent.requestPermission().then(res=>{
      if(res==="granted"){
        window.addEventListener("deviceorientation", handleOrientation);
      }
    });
  } else {
    window.addEventListener("deviceorientation", handleOrientation);
  }
}, {once:true});

// 📸 CAPTURE
document.getElementById("capture").onclick = () => {
  const canvas2 = document.createElement("canvas");
  canvas2.width = video.videoWidth;
  canvas2.height = video.videoHeight;

  const ctx = canvas2.getContext("2d");
  ctx.drawImage(video,0,0);

  console.log(canvas2.toDataURL("image/jpeg"));
};

// 🔄 LOOP
function animate(){
  requestAnimationFrame(animate);

  // rotate ghost frame slowly (visual effect)
  frame3D.rotation.y += 0.005;

  renderer.render(scene, camera);
}
animate();

</script>

</body>
</html>
