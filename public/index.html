<!DOCTYPE html>
<html>
<head>
  <title>3D Street View Capture</title>

  <style>
    body { margin:0; overflow:hidden; background:black; }
    video {
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-1;
    }

    #info {
      position:absolute;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      color:white;
      background:rgba(0,0,0,0.6);
      padding:8px 12px;
      border-radius:8px;
      font-family:Arial;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="info">Tap to start</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
const video = document.getElementById("video");
const info = document.getElementById("info");

let scene, camera, renderer;
let targets = [];
let step = 0;
let images = [];
let capturing = false;

// 🎥 CAMERA STREAM
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" } }
  });
  video.srcObject = stream;
}
startCamera();

// 🎮 THREE SETUP
scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

renderer = new THREE.WebGLRenderer({ alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🌐 SPHERE (environment reference)
const geometry = new THREE.SphereGeometry(50, 32, 32);
const material = new THREE.MeshBasicMaterial({
  color: 0x111111,
  wireframe: true
});
const sphere = new THREE.Mesh(geometry, material);
scene.add(sphere);

// 🎯 CREATE TARGET DOTS
function createTarget(x, y, z) {
  const geo = new THREE.SphereGeometry(1, 16, 16);
  const mat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
  const dot = new THREE.Mesh(geo, mat);

  dot.position.set(x, y, z);
  scene.add(dot);

  targets.push(dot);
}

// 📍 TARGET POSITIONS (around sphere)
createTarget(20, 0, -40);
createTarget(-20, 0, -40);
createTarget(0, 20, -40);
createTarget(0, -20, -40);
createTarget(30, 10, -40);
createTarget(-30, -10, -40);

// 🎥 CAMERA POSITION
camera.position.set(0, 0, 0);

// 📡 GYRO CONTROL
function handleOrientation(event) {
  const alpha = event.alpha * Math.PI / 180;
  const beta = event.beta * Math.PI / 180;

  camera.rotation.y = alpha;
  camera.rotation.x = beta;
}

// 📸 CAPTURE
function capture() {
  capturing = true;

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  images.push(canvas.toDataURL("image/jpeg"));

  targets[step].material.color.set(0x555555); // mark done

  step++;

  if (step >= targets.length) {
    info.innerText = "All captured ✅";
    console.log(images);
    return;
  }

  info.innerText = `Captured ${step}/${targets.length}`;

  setTimeout(() => capturing = false, 1000);
}

// 🎯 ALIGN CHECK
function checkAlignment() {
  if (step >= targets.length) return;

  const target = targets[step];

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  const targetDir = target.position.clone().normalize();

  const angle = dir.angleTo(targetDir);

  if (angle < 0.2 && !capturing) {
    capture();
  }
}

// 🔄 RENDER LOOP
function animate() {
  requestAnimationFrame(animate);
  checkAlignment();
  renderer.render(scene, camera);
}
animate();

// 📱 INIT GYRO
function initGyro() {
  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission()
      .then(res => {
        if (res === "granted") {
          window.addEventListener("deviceorientation", handleOrientation);
        }
      });
  } else {
    window.addEventListener("deviceorientation", handleOrientation);
  }

  info.innerText = "Move phone to align targets";
}

document.body.addEventListener("click", initGyro, { once:true });

</script>

</body>
</html>
